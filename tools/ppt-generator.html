<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPT 一键生成器 · 小吴老师</title>
  <meta name="description" content="输入课题自动生成PPT课件。三档品质：一般/标准/高端，支持多学科多风格。">
  <link rel="stylesheet" href="../style.css">
  <!-- PptxGenJS 库：用来生成真正的 .pptx 文件 -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <style>
    .tool-section { max-width: 760px; margin: 40px auto; }
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-md);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a1a2e;
      font-size: 0.95em;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95em;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* 三档按钮选择器 */
    .tier-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tier-option { display: none; }
    .tier-label {
      display: block;
      text-align: center;
      padding: 16px 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tier-label:hover { border-color: var(--primary); }
    .tier-label h4 { font-size: 1em; margin-bottom: 4px; }
    .tier-label p { font-size: 0.8em; color: var(--text-light); }
    .tier-option:checked + .tier-label {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    /* 生成按钮 */
    .btn-generate {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1.05em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-generate:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 预览区 */
    .preview { margin-top: 24px; display: none; }
    .preview.show { display: block; }
    .preview-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
    }
    .preview-card h3 {
      color: var(--primary);
      margin-bottom: 12px;
    }
    .slide-item {
      padding: 10px 14px;
      margin-bottom: 8px;
      background: var(--bg);
      border-radius: 6px;
      border-left: 3px solid var(--primary);
      font-size: 0.92em;
    }
    .slide-item .slide-num { font-weight: 600; color: var(--primary); margin-right: 8px; }

    /* 响应式 */
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .tier-select { grid-template-columns: 1fr; }
      .form-card { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="../index.html" class="logo">小吴老师</a>
      <div class="nav-links">
        <a href="../index.html">首页</a>
        <a href="../index.html#posts">教程</a>
        <a href="ppt-generator.html">PPT生成器</a>
        <a href="../index.html#service">定制服务</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="tool-section">
      <h1 style="margin-bottom:8px;">📊 PPT 一键生成器</h1>
      <p style="color:var(--text-light);margin-bottom:28px;">填参数 → 生成大纲 → 下载 .pptx 文件，在 PowerPoint 里微调就能用</p>

      <div class="form-card">
        <!-- 课题信息 -->
        <div class="form-row">
          <div class="form-group">
            <label>学科</label>
            <select id="subject">
              <option>语文</option><option>数学</option><option>英语</option>
              <option>物理</option><option>化学</option><option>生物</option>
              <option>历史</option><option>地理</option><option>道德与法治</option>
              <option>科学</option><option>信息技术</option>
            </select>
          </div>
          <div class="form-group">
            <label>年级</label>
            <select id="grade">
              <option>一年级</option><option>二年级</option><option>三年级</option>
              <option>四年级</option><option>五年级</option><option>六年级</option>
              <option>七年级</option><option>八年级</option><option>九年级</option>
              <option>高一</option><option>高二</option><option>高三</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>课题</label>
          <input type="text" id="topic" placeholder="例如：分数的初步认识">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>页数</label>
            <select id="slideCount">
              <option>8</option><option>10</option><option>12</option><option>15</option><option>20</option>
            </select>
          </div>
          <div class="form-group">
            <label>风格</label>
            <select id="style">
              <option>简洁蓝白（数学/科学）</option>
              <option>古典雅致（语文/历史）</option>
              <option>温暖活泼（小学/英语）</option>
              <option>现代深色（比赛通用）</option>
            </select>
          </div>
        </div>

        <!-- 三档选择 -->
        <div class="form-group">
          <label>品质档位</label>
          <div class="tier-select">
            <input type="radio" name="tier" value="basic" id="tier-basic" class="tier-option">
            <label for="tier-basic" class="tier-label">
              <h4>📄 一般</h4>
              <p>无配图 · 基础排版<br>日常教学用</p>
            </label>

            <input type="radio" name="tier" value="standard" id="tier-standard" class="tier-option" checked>
            <label for="tier-standard" class="tier-label">
              <h4>📊 标准</h4>
              <p>精选配图 · 精细排版<br>公开课用</p>
            </label>

            <input type="radio" name="tier" value="premium" id="tier-premium" class="tier-option">
            <label for="tier-premium" class="tier-label">
              <h4>🏆 高端</h4>
              <p>丰富配图 · 醒目配色<br>比赛用</p>
            </label>
          </div>
        </div>

        <button class="btn-generate" id="generateBtn" onclick="generatePPT()">
          ⚡ 生成 PPT 并下载
        </button>
      </div>

      <!-- 预览区 -->
      <div class="preview" id="preview">
        <div class="preview-card">
          <h3>📋 生成的大纲预览</h3>
          <div id="slideList"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <strong>小吴老师 · 微课制作</strong>
          <p>用AI做更好的课</p>
        </div>
        <div class="footer-links">
          <span>微信 W15842967 · 闲鱼搜索「小吴老师微课」</span>
        </div>
      </div>
      <p class="footer-copy">© 2026 小吴老师</p>
    </div>
  </footer>

  <script>
  // ==================== PPT 生成器 ====================

  // ---------- 配色方案 ----------
  // 每个风格 × 档位的颜色组合。高端档位颜色更鲜明、对比更强。
  const COLOR_MAP = {
    '简洁蓝白（数学/科学）': {
      basic:   { primary: '2F5496', bg: 'FFFFFF', accent: 'D6E4F0', titleColor: '1F3864' },
      standard:{ primary: '2F5496', bg: 'FFFFFF', accent: 'BDD7EE', titleColor: '1F3864' },
      premium: { primary: '1B3A6B', bg: 'FFFFFF', accent: '4472C4', titleColor: '0D1F3C' }
    },
    '古典雅致（语文/历史）': {
      basic:   { primary: '8B6914', bg: 'FFF8F0', accent: 'E8D5B7', titleColor: '5C3D0E' },
      standard:{ primary: '8B6914', bg: 'FFF8F0', accent: 'D4B896', titleColor: '5C3D0E' },
      premium: { primary: '6B3A0E', bg: 'FFF8F0', accent: 'C4945A', titleColor: '3D1F06' }
    },
    '温暖活泼（小学/英语）': {
      basic:   { primary: 'E8734A', bg: 'FFFBFA', accent: 'FFD8CC', titleColor: 'A3402A' },
      standard:{ primary: 'E8734A', bg: 'FFFBFA', accent: 'FFC4B3', titleColor: 'A3402A' },
      premium: { primary: 'D4562A', bg: 'FFFBFA', accent: 'FF9470', titleColor: '7A2515' }
    },
    '现代深色（比赛通用）': {
      basic:   { primary: '3D3D3D', bg: 'FFFFFF', accent: 'D0D0D0', titleColor: '1A1A1A' },
      standard:{ primary: '2D2D2D', bg: 'FFFFFF', accent: 'B0B0B0', titleColor: '1A1A1A' },
      premium: { primary: '1A1A2E', bg: 'FFFFFF', accent: '667EEA', titleColor: '0D0D1A' }
    }
  };

  // ---------- 每种风格的理论色名（用于文字描述） ----------
  const STYLE_COLOR_NAMES = {
    '简洁蓝白（数学/科学）': { basic: '淡蓝底+深蓝字', standard: '湖蓝辅色+深蓝标题', premium: '宝蓝强调+藏青标题，对比鲜明' },
    '古典雅致（语文/历史）': { basic: '米白底+棕黄字', standard: '驼色辅色+深棕标题', premium: '金棕强调+深褐标题，古韵突出' },
    '温暖活泼（小学/英语）': { basic: '暖白底+橙红字', standard: '浅橙辅色+深橙标题', premium: '亮橙强调+朱红标题，活力醒目' },
    '现代深色（比赛通用）': { basic: '白底+灰字', standard: '浅灰辅色+深灰标题', premium: '蓝紫强调+墨黑标题，高端冷感' }
  };

  // ---------- 各学科的知识点拆分模板（让每页内容更贴合学科） ----------
  const SLIDE_TEMPLATES = {
    '语文': ['背景导入：作者/时代/文体简介', '课文朗读：重点段落原文', '字词解析：生字注音+释义', '内容梳理：段落大意+结构图', '重点赏析：修辞手法/写作特点', '主题提炼：中心思想', '拓展延伸：相关篇目/写作练习', '课堂小结'],
    '数学': ['情境导入：生活中的数学问题', '概念讲解：定义+公式', '例题精讲：典型题分步解析', '变式练习：换个条件再练', '方法归纳：解题思路总结', '易错提醒：常见错误对比', '综合应用：实际场景题', '课堂小结'],
    '英语': ['Warm-up: 情景对话/歌曲导入', 'New Words: 单词+配图+发音', 'Key Sentences: 句型展示+替换练习', 'Dialogue: 对话分角色', 'Grammar: 语法点归纳', 'Practice: 听说读写练习', 'Culture: 文化小知识', 'Summary'],
    '物理': ['现象引入：实验/生活场景', '概念建立：物理量+公式', '实验探究：步骤+数据+结论', '规律总结：定律表述', '例题解析：计算+思路', '生活应用：技术/自然现象', '易错辨析：常见误解', '课堂小结'],
    '化学': ['情境引入：生活/工业场景', '物质性质：物理+化学性质', '实验演示：装置+现象+方程式', '原理分析：微观解释', '方程式书写：配平技巧', '联系实际：用途+安全', '对比归纳：同类物质比较', '课堂小结'],
    '生物': ['情境导入：生命现象/图片', '结构认知：形态+功能', '过程分析：生理过程图解', '实验观察：步骤+结果', '联系生活：健康/环境', '知识网络：概念图', '拓展阅读：前沿科学', '课堂小结'],
    '历史': ['时间轴导入：时代背景', '关键事件：起因+经过+结果', '人物聚焦：主要人物+贡献', '史料分析：文献/图片解读', '影响意义：历史评价', '中外对比：同时期世界', '古今联系：对今天的影响', '课堂小结'],
    '地理': ['地图导入：区域定位', '自然特征：地形+气候+水文', '人文特征：人口+经济+城市', '图表分析：数据图/分布图', '成因探究：自然/人文因素', '区域对比：不同地区比较', '人地关系：资源+环境', '课堂小结']
  };

  const DEFAULT_TEMPLATE = ['封面：课题+学科+年级', '导入：情境引入', '新知讲解1', '新知讲解2', '新知讲解3', '练习/互动', '拓展延伸', '课堂小结'];

  // ---------- 核心：生成 PPT ----------
  function generatePPT() {
    // 1. 读取用户输入的参数
    const subject    = document.getElementById('subject').value;
    const grade      = document.getElementById('grade').value;
    const topic      = document.getElementById('topic').value || '未命名课题';
    const slideCount = parseInt(document.getElementById('slideCount').value);
    const style      = document.getElementById('style').value;
    const tier       = document.querySelector('input[name="tier"]:checked').value;

    // 2. 获取该风格+档位的配色
    const colors = COLOR_MAP[style][tier];
    const colorName = STYLE_COLOR_NAMES[style][tier];

    // 3. 根据学科匹配知识点模板,没有专用模板就用通用模板
    const template = SLIDE_TEMPLATES[subject] || DEFAULT_TEMPLATE;

    // 4. 生成幻灯片大纲（文字预览用）
    const slides = buildSlideOutline(template, topic, subject, grade, slideCount);

    // 5. 显示预览
    showPreview(slides, tier, subject, style, colorName);

    // 6. 生成并下载 .pptx 文件
    downloadPPTX(slides, topic, grade, tier, colors);
  }

  // ---------- 构建幻灯片大纲 ----------
  function buildSlideOutline(template, topic, subject, grade, slideCount) {
    const slides = [];

    // 把模板内容循环填充到指定页数
    for (let i = 0; i < slideCount; i++) {
      // 循环使用模板中的知识点标题
      const templateItem = template[i % template.length];
      const slideNum = i + 1;

      // 根据档位生成不同的内容深度
      let title = templateItem;
      let content = '';

      if (i === 0) {
        title = topic;
        content = `${subject} · ${grade}`;
      } else if (i === slideCount - 1) {
        title = '课堂小结';
        content = '回顾本课核心知识点，布置作业';
      } else {
        // 用模板标题 + 学科语境填充
        title = templateItem.replace('导入', topic + ' 导入')
                          .replace('新知讲解', topic + ' 知识点')
                          .replace('练习/互动', '练习与互动')
                          .replace('拓展延伸', '拓展延伸：' + topic + ' 相关');
        content = `本节要点：${templateItem}，结合 ${grade} 学情设计`;
      }

      slides.push({ num: slideNum, title, content });
    }

    return slides;
  }

  // ---------- 显示大纲预览 ----------
  function showPreview(slides, tier, subject, style, colorName) {
    const preview = document.getElementById('preview');
    const slideList = document.getElementById('slideList');

    const tierNames = { basic: '一般', standard: '标准', premium: '高端' };
    const tierFeatures = {
      basic: '无配图（纯文字排版）',
      standard: '精选配图 + 精细排版',
      premium: '丰富配图 + 醒目配色，适合比赛'
    };

    let html = `
      <p style="margin-bottom:12px;font-size:0.9em;">
        📐 风格：<strong>${style}</strong> &nbsp;|&nbsp;
        🎨 配色：<strong>${colorName}</strong> &nbsp;|&nbsp;
        🏷️ 档位：<strong>${tierNames[tier]} · ${tierFeatures[tier]}</strong>
      </p>
    `;

    slides.forEach(s => {
      html += `
        <div class="slide-item">
          <span class="slide-num">#${s.num}</span> ${s.title}
          <span style="color:var(--text-light);font-size:0.85em;">— ${s.content}</span>
        </div>
      `;
    });

    slideList.innerHTML = html;
    preview.classList.add('show');

    // 滚动到预览区
    preview.scrollIntoView({ behavior: 'smooth' });
  }

  // ---------- 生成 .pptx 并触发下载 ----------
  function downloadPPTX(slides, topic, grade, tier, colors) {
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_WIDE';
    pptx.defineLayout({ name:'WIDE', width:'13.333', height:'7.5' });

    // 三个档位的排版参数 —— 差距拉大，一眼看出不同
    const tierConfig = {
      basic:   { titleSize: 28, bodySize: 16, margin: 0.8, accentWidth: 0,     accentBar: false, separator: false, topBar: false, contentSections: 1 },
      standard:{ titleSize: 36, bodySize: 20, margin: 0.6, accentWidth: 0.14,  accentBar: true,  separator: true,  topBar: true,  contentSections: 2 },
      premium: { titleSize: 44, bodySize: 24, margin: 0.6, accentWidth: 0.22,  accentBar: true,  separator: true,  topBar: true,  contentSections: 3 }
    };
    const cfg = tierConfig[tier];

    // 根据档位生成不同深度的内容描述
    const sectionLabels = {
      basic: ['教学内容'],
      standard: ['教学目标', '教学提示'],
      premium: ['教学目标', '教学提示', '互动设计']
    };
    const sectionContents = {
      basic: [slide => slide.content],
      standard: [
        slide => slide.content,
        slide => `结合${grade}学生认知水平，本环节建议配合板书与多媒体素材展示，帮助学生直观理解。`
      ],
      premium: [
        slide => slide.content,
        slide => `结合${grade}学情，本环节建议使用视频/动画辅助，配合${slide.num > 3 ? '小组讨论' : '师生问答'}加深理解。`,
        slide => `🎯 互动建议：${slide.num % 2 === 0 ? '随机点名提问，检验理解度' : '小组内互相复述本知识点，选代表发言'}`
      ]
    };

    // 遍历每一页
    slides.forEach(slide => {
      const s = pptx.addSlide();
      const labels = sectionLabels[tier];
      const contents = sectionContents[tier];

      // === 背景 ===
      s.background = { color: colors.bg };

      // === 左侧强调色条 ===
      if (cfg.accentBar) {
        // 高端：渐变效果（用双色块模拟）
        if (tier === 'premium') {
          s.addShape(pptx.ShapeType.rect, {
            x: 0, y: 0, w: cfg.accentWidth + 0.04, h: '100%',
            fill: { color: colors.primary }
          });
          s.addShape(pptx.ShapeType.rect, {
            x: 0, y: 0, w: cfg.accentWidth, h: '100%',
            fill: { color: colors.accent }
          });
        } else {
          s.addShape(pptx.ShapeType.rect, {
            x: 0, y: 0, w: cfg.accentWidth, h: '100%',
            fill: { color: colors.accent }
          });
        }
      }

      // === 顶部导航条（高端专属：整条横贯） ===
      if (tier === 'premium') {
        s.addShape(pptx.ShapeType.rect, {
          x: 0, y: 0, w: '100%', h: 0.08,
          fill: { color: colors.accent }
        });
      }

      // === 顶部小装饰块 ===
      if (cfg.topBar) {
        const barX = cfg.accentBar ? cfg.accentWidth + 0.25 : 0.6;
        s.addShape(pptx.ShapeType.rect, {
          x: barX, y: 0.35, w: tier === 'premium' ? 1.2 : 0.6, h: tier === 'premium' ? 0.08 : 0.06,
          fill: { color: colors.primary }
        });
      }

      // === 页码 ===
      // 高端：页码有底色圆角标签
      if (tier === 'premium') {
        s.addShape(pptx.ShapeType.roundRect, {
          x: 11.8, y: 6.8, w: 0.55, h: 0.32,
          fill: { color: colors.primary }, rectRadius: 0.06
        });
        s.addText(`${slide.num}`, {
          x: 11.8, y: 6.8, w: 0.55, h: 0.32,
          fontSize: 9, color: 'FFFFFF', align: 'center', fontFace: 'Microsoft YaHei'
        });
      } else {
        s.addText(`${slide.num}`, {
          x: 12.0, y: 6.85, w: 0.8, h: 0.3,
          fontSize: 9, color: '999999', align: 'right', fontFace: 'Microsoft YaHei'
        });
      }

      // === 标题 ===
      const titleX = cfg.accentBar ? cfg.accentWidth + 0.3 : 0.8;
      s.addText(slide.title, {
        x: titleX, y: 0.55, w: 12 - titleX, h: tier === 'premium' ? 1.1 : 0.9,
        fontSize: cfg.titleSize, bold: true,
        color: colors.titleColor, fontFace: 'Microsoft YaHei'
      });

      // === 分隔线 ===
      if (cfg.separator) {
        if (tier === 'premium') {
          // 高端：双层分隔，主色 + 辅色
          s.addShape(pptx.ShapeType.rect, {
            x: titleX, y: 1.55, w: 4.0, h: 0.05,
            fill: { color: colors.accent }
          });
          s.addShape(pptx.ShapeType.rect, {
            x: titleX, y: 1.63, w: 2.2, h: 0.04,
            fill: { color: colors.primary }
          });
        } else {
          // 标准：单线分隔
          s.addShape(pptx.ShapeType.rect, {
            x: titleX, y: 1.5, w: 2.5, h: 0.04,
            fill: { color: colors.accent }
          });
        }
      }

      // === 正文：每个档位的内容板块数量不同 ===
      let contentY = cfg.separator ? 1.85 : 1.5;
      const contentX = cfg.accentBar ? cfg.accentWidth + 0.3 : 0.8;
      const contentW = 12.5 - contentX;

      labels.forEach((label, i) => {
        const block = [];
        const sectionColor = tier === 'premium' ? colors.primary : (tier === 'standard' ? colors.primary : '666666');

        // 板块小标题
        block.push({ text: `▎${label}`, options: { bold: true, fontSize: cfg.bodySize, color: sectionColor, breakLine: true } });
        // 板块内容
        block.push({ text: contents[i](slide), options: { fontSize: cfg.bodySize - 2, color: tier === 'basic' ? '555555' : '444444', breakLine: true } });

        // 板块间距
        if (i < labels.length - 1) {
          block.push({ text: '', options: { fontSize: 6, breakLine: true } });
        }

        s.addText(block, {
          x: contentX, y: contentY, w: contentW, h: 1.2,
          valign: 'top', fontFace: 'Microsoft YaHei', lineSpacingMultiple: 1.3
        });

        contentY += 1.25; // 每个板块往下移
      });

      // === 底部装饰 ===
      if (tier === 'premium') {
        // 高端底部装饰条
        s.addShape(pptx.ShapeType.rect, {
          x: 0, y: 7.35, w: '100%', h: 0.04,
          fill: { color: colors.accent }
        });
      }

      // === 底部水印 ===
      s.addText('小吴老师 · 微课制作', {
        x: 0, y: tier === 'premium' ? 7.4 : 7.15, w: 13.333, h: 0.25,
        fontSize: 7, color: 'CCCCCC', align: 'center', fontFace: 'Microsoft YaHei'
      });
    });

    // 触发下载
    const tierLabel = { basic: '一般', standard: '标准', premium: '高端' };
    const fileName = `${topic}_${grade}${subject}_${tierLabel[tier]}档.pptx`;
    pptx.writeFile({ fileName });
  }
  </script>

</body>
</html>
