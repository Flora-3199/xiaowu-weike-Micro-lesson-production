<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPT 制作清单生成器 · 小吴老师</title>
  <meta name="description" content="输入课题自动生成PPT制作清单：每页内容、画面建议、素材关键词、配色方案。三档品质：一般/标准/高端。">
  <link rel="stylesheet" href="../style.css">
  <style>
    .tool-section { max-width: 800px; margin: 40px auto; }
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-md);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-weight: 600; margin-bottom: 6px;
      color: #1a1a2e; font-size: 0.95em;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.95em; font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .tier-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tier-option { display: none; }
    .tier-label {
      display: block; text-align: center; padding: 16px 12px;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s;
    }
    .tier-label:hover { border-color: var(--primary); }
    .tier-label h4 { font-size: 1em; margin-bottom: 4px; }
    .tier-label p { font-size: 0.8em; color: var(--text-light); }
    .tier-option:checked + .tier-label { border-color: var(--primary); background: var(--primary-light); }

    .btn-generate {
      width: 100%; padding: 14px; background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 1.05em;
      font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-generate:hover { background: var(--primary-dark); }

    /* 清单输出区 */
    .checklist { margin-top: 24px; display: none; }
    .checklist.show { display: block; }

    .checklist-header {
      background: var(--white); border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow-md); margin-bottom: 20px;
    }
    .checklist-header .meta-row {
      display: flex; gap: 24px; flex-wrap: wrap; margin-top: 12px;
      font-size: 0.9em; color: var(--text-light);
    }
    .checklist-header .meta-row strong { color: var(--text); }

    .slide-card {
      background: var(--white); border-radius: var(--radius); padding: 22px 24px;
      box-shadow: var(--shadow-sm); margin-bottom: 14px;
      border-left: 4px solid var(--primary); transition: all 0.2s;
    }
    .slide-card:hover { box-shadow: var(--shadow-md); }
    .slide-card.premium { border-left-color: #6B3A0E; }
    .slide-card.standard { border-left-color: var(--primary); }
    .slide-card.basic { border-left-color: #ccc; }

    .slide-num {
      display: inline-block; background: var(--primary); color: #fff;
      font-size: 0.78em; font-weight: 700; padding: 2px 10px;
      border-radius: 10px; margin-bottom: 8px;
    }
    .premium .slide-num { background: #6B3A0E; }
    .basic .slide-num { background: #aaa; }

    .slide-title { font-size: 1.1em; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .slide-content { font-size: 0.92em; color: var(--text-light); margin-bottom: 10px; }

    .slide-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .slide-detail.full { grid-template-columns: 1fr; }
    .detail-item { font-size: 0.85em; }
    .detail-item .dt { font-weight: 600; color: var(--text); }
    .detail-item .dd { color: var(--text-light); margin-left: 4px; }

    .material-tag {
      display: inline-block; background: #f0f4ff; color: var(--primary);
      font-size: 0.8em; padding: 1px 8px; border-radius: 4px; margin: 2px 3px;
    }
    .premium .material-tag { background: #fff8f0; color: #8B6914; }

    /* 顶部信息bar */
    .info-bar {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
      padding: 12px 16px; background: var(--primary-light); border-radius: var(--radius-sm);
      font-size: 0.88em;
    }
    .info-bar span { font-weight: 500; }

    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    .btn-copy, .btn-print {
      padding: 10px 20px; border-radius: 20px; font-size: 0.9em;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-copy { background: var(--primary); color: #fff; border: none; }
    .btn-copy:hover { background: var(--primary-dark); }
    .btn-print { background: var(--white); color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-print:hover { background: var(--primary-light); }

    .checklist-footer {
      background: var(--white); border-radius: var(--radius); padding: 20px 24px;
      box-shadow: var(--shadow-sm); margin-top: 20px; font-size: 0.9em;
    }
    .checklist-footer h4 { margin-bottom: 8px; color: #1a1a2e; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .tier-select { grid-template-columns: 1fr; }
      .slide-detail { grid-template-columns: 1fr; }
      .form-card { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="../index.html" class="logo">小吴老师</a>
      <div class="nav-links">
        <a href="../index.html">首页</a>
        <a href="../index.html#posts">教程</a>
        <a href="ppt-generator.html">PPT生成器</a>
        <a href="../index.html#service">定制服务</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="tool-section">
      <h1 style="margin-bottom:4px;">📊 PPT 制作清单生成器</h1>
      <p style="color:var(--text-light);margin-bottom:28px;">输入课题 → 生成每一页的详细制作清单。照着做，不用想"这页放什么"。</p>

      <div class="form-card">
        <div class="form-row">
          <div class="form-group">
            <label>学科</label>
            <select id="subject">
              <option>语文</option><option>数学</option><option>英语</option>
              <option>物理</option><option>化学</option><option>生物</option>
              <option>历史</option><option>地理</option><option>道德与法治</option>
              <option>科学</option><option>信息技术</option>
            </select>
          </div>
          <div class="form-group">
            <label>年级</label>
            <select id="grade">
              <option>一年级</option><option>二年级</option><option>三年级</option>
              <option>四年级</option><option>五年级</option><option>六年级</option>
              <option>七年级</option><option>八年级</option><option>九年级</option>
              <option>高一</option><option>高二</option><option>高三</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>课题</label>
          <input type="text" id="topic" placeholder="例如：分数的初步认识">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>页数</label>
            <select id="slideCount">
              <option>8</option><option>10</option><option>12</option><option>15</option>
            </select>
          </div>
          <div class="form-group">
            <label>风格</label>
            <select id="style">
              <option>简洁蓝白（数学/科学）</option>
              <option>古典雅致（语文/历史）</option>
              <option>温暖活泼（小学/英语）</option>
              <option>现代深色（比赛通用）</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>品质档位</label>
          <div class="tier-select">
            <input type="radio" name="tier" value="basic" id="tier-basic" class="tier-option">
            <label for="tier-basic" class="tier-label">
              <h4>📄 一般</h4><p>无配图 · 基础排版<br>日常教学用</p>
            </label>
            <input type="radio" name="tier" value="standard" id="tier-standard" class="tier-option" checked>
            <label for="tier-standard" class="tier-label">
              <h4>📊 标准</h4><p>精选配图 · 精细排版<br>公开课用</p>
            </label>
            <input type="radio" name="tier" value="premium" id="tier-premium" class="tier-option">
            <label for="tier-premium" class="tier-label">
              <h4>🏆 高端</h4><p>丰富配图 · 醒目配色<br>比赛用</p>
            </label>
          </div>
        </div>

        <button class="btn-generate" onclick="generate()">
          ⚡ 生成制作清单
        </button>
      </div>

      <!-- 清单输出 -->
      <div class="checklist" id="checklist"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand"><strong>小吴老师 · 微课制作</strong><p>用AI做更好的课</p></div>
        <div class="footer-links"><span>微信 W15842967 · 闲鱼搜索「小吴老师微课」</span></div>
      </div>
      <p class="footer-copy">© 2026 小吴老师</p>
    </div>
  </footer>

  <script>
  // ==================== PPT 制作清单生成器 ====================

  // ---------- 每个学科的关键词映射（用于生成素材搜索关键词）----------
  const SUBJECT_KEYWORDS = {
    '语文': { bg: '古风 水墨 宣纸', icon: '毛笔 书卷 竹简', scene: '诗词 对联 古典', people: '古代人物 诗人' },
    '数学': { bg: '几何 线条 网格', icon: '数字 公式 图形', scene: '计算 测量 图表', people: '教师 学生' },
    '英语': { bg: '字母 英伦 国际', icon: 'ABC 单词卡 地球', scene: '校园 旅行 对话', people: '外教 学生 卡通' },
    '物理': { bg: '星空 电路 力学', icon: '公式 仪器 箭头', scene: '实验 运动 太空', people: '科学家 宇航员' },
    '化学': { bg: '分子 试管 元素', icon: '烧瓶 元素周期表 原子', scene: '实验室 工厂 环境', people: '科研人员' },
    '生物': { bg: '细胞 森林 海洋', icon: 'DNA 显微镜 叶子', scene: '生态系统 人体 动物', people: '生物学家' },
    '历史': { bg: '古建筑 地图 卷轴', icon: '青铜器 钱币 印章', scene: '战争 朝代 文明', people: '历史人物 古人' },
    '地理': { bg: '地球 等高线 云图', icon: '指南针 经纬度 等高线', scene: '地貌 气候 城市', people: '旅行者' },
    '道德与法治': { bg: '天平 宪法 国旗', icon: '盾牌 天平 书', scene: '社会 法庭 校园', people: '法官 学生' },
    '科学': { bg: '星空 微观 实验', icon: '放大镜 齿轮 灯泡', scene: '自然 发明 探索', people: '科学家 发明家' },
    '信息技术': { bg: '代码 芯片 网络', icon: '电脑 键盘 数据', scene: '编程 互联网 AI', people: '程序员' }
  };

  // ---------- 每学科知识点模板 ----------
  const SLIDE_TEMPLATES = {
    '语文': ['背景导入', '课文朗读', '字词解析', '内容梳理', '重点赏析', '主题提炼', '拓展延伸', '课堂小结'],
    '数学': ['情境导入', '概念讲解', '例题精讲', '变式练习', '方法归纳', '易错提醒', '综合应用', '课堂小结'],
    '英语': ['Warm-up 热身', 'New Words 单词', 'Key Sentences 句型', 'Dialogue 对话', 'Grammar 语法', 'Practice 练习', 'Culture 文化', 'Summary 小结'],
    '物理': ['现象引入', '概念建立', '实验探究', '规律总结', '例题解析', '生活应用', '易错辨析', '课堂小结'],
    '化学': ['情境引入', '物质性质', '实验演示', '原理分析', '方程式书写', '联系实际', '对比归纳', '课堂小结'],
    '生物': ['情境导入', '结构认知', '过程分析', '实验观察', '联系生活', '知识网络', '拓展阅读', '课堂小结'],
    '历史': ['时代背景', '关键事件', '人物聚焦', '史料分析', '影响意义', '中外对比', '古今联系', '课堂小结'],
    '地理': ['区域定位', '自然特征', '人文特征', '图表分析', '成因探究', '区域对比', '人地关系', '课堂小结'],
    '道德与法治': ['案例引入', '概念辨析', '法律链接', '情境讨论', '价值引导', '实践行动', '社会延伸', '课堂小结'],
    '科学': ['现象观察', '问题提出', '实验设计', '数据分析', '结论验证', '生活应用', '科学故事', '课堂小结'],
    '信息技术': ['情境导入', '知识讲解', '操作演示', '任务实践', '作品展示', '技术原理', '拓展创新', '课堂小结']
  };
  const DEFAULT_TEMPLATE = ['封面', '导入环节', '新知讲解 ①', '新知讲解 ②', '新知讲解 ③', '练习互动', '拓展延伸', '课堂小结'];

  // ---------- 各风格的配色方案 ----------
  const STYLE_COLORS = {
    '简洁蓝白（数学/科学）':   { name:'蓝白简洁', bg:'#FFFFFF', primary:'#2F5496', accent:'#D6E4F0', text:'#333333', font:'微软雅黑' },
    '古典雅致（语文/历史）':   { name:'古典雅致', bg:'#FFF8F0', primary:'#8B6914', accent:'#E8D5B7', text:'#4A3620', font:'楷体' },
    '温暖活泼（小学/英语）':   { name:'温暖活泼', bg:'#FFFBFA', primary:'#E8734A', accent:'#FFD8CC', text:'#4A2820', font:'微软雅黑' },
    '现代深色（比赛通用）':     { name:'现代深色', bg:'#FFFFFF', primary:'#2D2D2D', accent:'#667EEA', text:'#1A1A1A', font:'思源黑体' }
  };

  // ---------- 三档的详细特征描述 ----------
  const TIER_DETAIL = {
    basic: {
      label: '一般',
      icon: '📄',
      features: ['纯文字排版，不配图', '标题 + 正文直接排列', '不使用辅助装饰', '适合日常教学快速制作'],
      imageNote: '无配图',
      decorationNote: '无装饰元素',
      layoutNote: '左对齐标题，正文紧跟',
      extras: []
    },
    standard: {
      label: '标准',
      icon: '📊',
      features: ['每页 1-2 张精选配图', '正文分拆为 2-3 个信息块', '使用辅色条+装饰线', '适合公开课 / 示范课'],
      imageNote: '每页配 1-2 张相关插图/示意图',
      decorationNote: '左侧辅色细条 + 标题下分隔线',
      layoutNote: '标题在上，正文左排，配图居右',
      extras: ['建议每页添加统一的学校/教研组 logo']
    },
    premium: {
      label: '高端',
      icon: '🏆',
      features: ['每页 2-3 张高质量配图', '正文分拆为 4-5 个信息块', '主色+辅色双色条，转角徽章', '适合教学比赛 / 省级评选'],
      imageNote: '每页配 2-3 张高质量照片/插图/信息图',
      decorationNote: '左侧双色粗条 + 顶部横贯色条 + 标题下双线分隔 + 底部装饰条',
      layoutNote: '标题突出，正文左右分栏，配图网格化排列',
      extras: ['页码使用带底色的圆角徽章', '封面页使用全幅背景图', '尾页加联系方式+二维码']
    }
  };

  // ---------- 为每页生成画面建议 ----------
  function getVisualSuggestion(subject, templateItem, tier, slideNum, totalSlides) {
    const kw = SUBJECT_KEYWORDS[subject] || SUBJECT_KEYWORDS['科学'];
    const tierLevel = { basic: 0, standard: 1, premium: 2 };

    if (slideNum === 1) {
      // 封面
      if (tier === 'premium') return '全幅主题背景图 + 半透明遮罩 + 课题大字居中 + 学科/年级副标题';
      if (tier === 'standard') return '主题色渐变背景 + 课题大标题 + 学科年级信息 + 小装饰图标';
      return '纯色背景 + 课题标题 + 学科年级，不配图';
    }
    if (slideNum === totalSlides) {
      if (tier === 'premium') return '总结性信息图 + 核心知识点回顾卡片 + 感谢语 + 联系方式';
      if (tier === 'standard') return '知识点要点总结 + 简单装饰边框';
      return '文字总结，无配图';
    }

    // 中间页：按学科 + 模板项给画面建议
    const visualMap = {
      '导入': '情境照片/生活场景图',
      '背景导入': '时代背景图/相关历史照片',
      '情境导入': '生活场景照片/实物图',
      '现象引入': '实验照片/自然现象图',
      '概念讲解': '概念示意图/思维导图',
      '概念建立': '定义卡片+示意图',
      '字词解析': '生字大图+笔顺动画截图',
      '内容梳理': '段落结构思维导图',
      '例题精讲': '题目截图+分步解题图',
      '实验探究': '实验装置图+步骤流程图',
      '实验演示': '实验装置图+现象对比图',
      '练习': '练习题卡片',
      '拓展延伸': '相关书籍/视频封面/拓展阅读图',
    };

    for (const [key, val] of Object.entries(visualMap)) {
      if (templateItem.includes(key)) return val;
    }

    if (tier === 'premium') return '相关高清摄影/手绘插图/动态示意图';
    if (tier === 'standard') return '相关插图/图标/示意图';
    return '纯文字排版';
  }

  // ---------- 生成素材搜索关键词 ----------
  function getMaterialKeywords(subject, templateItem, tier) {
    const kw = SUBJECT_KEYWORDS[subject] || SUBJECT_KEYWORDS['科学'];
    const base = [];
    if (templateItem.includes('导入') || templateItem.includes('引入')) base.push(kw.scene, kw.bg);
    else if (templateItem.includes('概念') || templateItem.includes('讲解')) base.push(kw.icon, '示意');
    else if (templateItem.includes('实验')) base.push('实验', '步骤');
    else if (templateItem.includes('练习') || templateItem.includes('互动')) base.push('互动', '卡片');
    else if (templateItem.includes('拓展') || templateItem.includes('延伸')) base.push('阅读', '拓展');
    else if (templateItem.includes('小结') || templateItem.includes('总结')) base.push('总结', '回顾');
    else base.push(kw.bg, kw.icon);

    // 高端档加更多关键词
    if (tier === 'premium') base.push('高清', '商用');
    if (tier !== 'basic') base.push('免抠');

    return [...new Set(base)].slice(0, 4).join(' · ');
  }

  // ---------- 主函数：生成清单 ----------
  function generate() {
    const subject    = document.getElementById('subject').value;
    const grade      = document.getElementById('grade').value;
    const topic      = document.getElementById('topic').value || '未命名课题';
    const slideCount = parseInt(document.getElementById('slideCount').value);
    const style      = document.getElementById('style').value;
    const tier       = document.querySelector('input[name="tier"]:checked').value;

    const colors   = STYLE_COLORS[style];
    const kw       = SUBJECT_KEYWORDS[subject] || SUBJECT_KEYWORDS['科学'];
    const template = SLIDE_TEMPLATES[subject] || DEFAULT_TEMPLATE;
    const tierInfo = TIER_DETAIL[tier];

    // 生成每一页的数据
    const slides = [];
    for (let i = 0; i < slideCount; i++) {
      const num = i + 1;
      const tpl = template[i % template.length];
      let title, content;

      if (i === 0) {
        title = topic;
        content = `封面页 · ${subject}${grade}`;
      } else if (i === slideCount - 1) {
        title = '课堂小结';
        content = '回顾本课核心知识点，梳理知识框架，布置课后作业';
      } else {
        title = tpl;
        content = generateContent(tpl, topic, grade, subject, tier, num);
      }

      slides.push({
        num, title, content,
        visual: getVisualSuggestion(subject, tpl, tier, num, slideCount),
        materials: getMaterialKeywords(subject, tpl, tier),
        colorTip: getColorTip(style, tier, num, slideCount),
        fontTip: tier === 'premium' ? `${colors.font}，标题加粗 ${tier === 'premium' ? '44' : '36'}pt，正文 ${tier === 'premium' ? '24' : '20'}pt` : null
      });
    }

    render(slides, { subject, grade, topic, style, tier, colors, tierInfo });
  }

  // ---------- 为每页生成内容描述 ----------
  function generateContent(tpl, topic, grade, subject, tier, num) {
    const base = `${grade} · ${tpl}环节`;
    // 标准+高端加更详细的教学描述
    if (tier === 'premium') {
      return `【教学目标】通过${tpl}环节，引导学生掌握${topic}相关知识与技能。\n【设计思路】结合${grade}学情，以${num % 2 === 0 ? '学生自主探究' : '教师引导启发'}为主线推进。\n【时间分配】建议本环节用时 ${Math.floor(40/slideCount)} 分钟。`;
    }
    if (tier === 'standard') {
      return `本节课${tpl}环节，结合${grade}教学大纲要求设计。建议配合板书/多媒体展示，帮助学生理解${topic}核心概念。`;
    }
    return `${base}。教师讲解为主，学生听讲+笔记。`;
  }

  // ---------- 每页配色提示 ----------
  function getColorTip(style, tier, num, total) {
    if (tier === 'basic') return null;
    const tips = {
      '简洁蓝白（数学/科学）': { standard: '标题 #2F5496 深蓝 · 正文 #333 深灰 · 辅色条 #D6E4F0 淡蓝', premium: '标题 #1B3A6B 藏青 · 正文 #222 · 强调色条 #4472C4 宝蓝 · 装饰 #BDD7EE' },
      '古典雅致（语文/历史）': { standard: '标题 #8B6914 深棕 · 正文 #4A3620 · 辅色条 #E8D5B7 驼色', premium: '标题 #6B3A0E 深褐 · 正文 #3D1F06 · 强调色条 #C4945A 金棕 · 背景 #FFF8F0 米白' },
      '温暖活泼（小学/英语）': { standard: '标题 #E8734A 暖橙 · 正文 #4A2820 · 辅色条 #FFD8CC 浅橙', premium: '标题 #D4562A 朱红 · 正文 #4A2020 · 强调色条 #FF9470 亮橙 · 背景 #FFFBFA' },
      '现代深色（比赛通用）': { standard: '标题 #2D2D2D 深灰 · 正文 #333 · 辅色条 #B0B0B0 浅灰', premium: '标题 #1A1A2E 墨黑 · 正文 #222 · 强调色条 #667EEA 蓝紫 · 装饰 #D0D0FF' }
    };
    return tips[style]?.[tier] || null;
  }

  // ---------- 渲染清单到页面 ----------
  function render(slides, ctx) {
    const { subject, grade, topic, style, tier, colors, tierInfo } = ctx;
    const checklist = document.getElementById('checklist');
    const tierCSS = tier; // 'basic' | 'standard' | 'premium'

    let html = '';

    // 清单头部
    html += `
    <div class="checklist-header">
      <h3>📋 ${topic} · PPT 制作清单</h3>
      <div class="meta-row">
        <span>📐 <strong>${subject} · ${grade}</strong></span>
        <span>🎨 风格：<strong>${style}</strong></span>
        <span>📑 共 <strong>${slides.length} 页</strong></span>
        <span>🏷️ 档位：<strong>${tierInfo.label} ${tierInfo.icon}</strong></span>
      </div>

      <div class="info-bar">
        <span>🖼️ 配图策略：<strong>${tierInfo.imageNote}</strong></span>
        <span>🎀 装饰方案：<strong>${tierInfo.decorationNote}</strong></span>
        <span>📐 排版规则：<strong>${tierInfo.layoutNote}</strong></span>
        <span>🎨 主色：<strong>${colors.primary}</strong> · 辅色：<strong>${colors.accent}</strong></span>
      </div>
    </div>`;

    // 每一页清单
    slides.forEach(s => {
      html += `
      <div class="slide-card ${tierCSS}">
        <span class="slide-num">第 ${s.num} 页</span>
        <div class="slide-title">${s.title}</div>
        <div class="slide-content">${s.content.replace(/\n/g, '<br>')}</div>

        <div class="slide-detail ${tier === 'basic' ? 'full' : ''}">
          <div class="detail-item">
            <span class="dt">🖼️ 画面建议</span>
            <span class="dd">${s.visual}</span>
          </div>
          <div class="detail-item">
            <span class="dt">🔍 素材搜词</span>
            <span class="dd">
              ${s.materials.split(' · ').map(k => `<span class="material-tag">${k}</span>`).join(' ')}
            </span>
          </div>`;

      if (s.colorTip) {
        html += `
          <div class="detail-item">
            <span class="dt">🎨 配色方案</span>
            <span class="dd">${s.colorTip}</span>
          </div>`;
      }

      if (s.fontTip) {
        html += `
          <div class="detail-item">
            <span class="dt">✍️ 字体字号</span>
            <span class="dd">${s.fontTip}</span>
          </div>`;
      }

      html += `</div></div>`;
    });

    // 底部总结
    html += `
    <div class="checklist-footer">
      <h4>📝 制作前准备清单</h4>
      <ul style="margin-left:20px;font-size:0.9em;">
        <li>素材网站：觅元素（mii.com）、千库网（58pic.com）、Pixabay</li>
        <li>字体安装：${colors.font}${tier === 'premium' ? ' + 思源宋体（封面标题用）' : ''}</li>
        <li>软件：PowerPoint / WPS，${tier === 'premium' ? '建议用 Keynote 或 PowerPoint 365（动画更流畅）' : '任意版本均可'}</li>
        <li>画面比例：16:9（${tier === 'premium' ? '建议同时导出 4:3 备选' : '标准宽屏'})</li>
        ${tierInfo.extras.map(e => `<li>${e}</li>`).join('')}
      </ul>
    </div>`;

    // 按钮
    html += `
    <div class="btn-row">
      <button class="btn-copy" onclick="copyChecklist()">📋 复制清单文本</button>
      <button class="btn-print" onclick="window.print()">🖨️ 打印清单</button>
    </div>`;

    checklist.innerHTML = html;
    checklist.classList.add('show');
    checklist.scrollIntoView({ behavior: 'smooth' });
  }

  // ---------- 复制清单为纯文本 ----------
  function copyChecklist() {
    const el = document.getElementById('checklist');
    const text = el.innerText;
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ 清单已复制到剪贴板，可以粘贴到记事本 / 微信 / Word 里使用');
    }).catch(() => {
      alert('复制失败，请手动选中文字 Ctrl+C');
    });
  }
  </script>

</body>
</html>
